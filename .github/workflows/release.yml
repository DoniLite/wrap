name: Release

# Tag-driven releases: `git tag v0.1.0 && git push origin v0.1.0`
# publishes @donilite/wrap and @donilite/create-wrap at that version.
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# One-time setup on npmjs.com for EACH package:
#   Package → Settings → Trusted publishers → GitHub Actions
#   repository: DoniLite/wrap — workflow: release.yml
# (A brand-new package needs one first manual `npm publish` before the
# trusted publisher can be configured.)

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # also needed to create the GitHub Release
      id-token: write # npm Trusted Publishing (OIDC + provenance)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build @donilite/wrap
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Tests
        working-directory: packages/create-wrap/template
        run: bun test

      - name: Apply the tag version to both packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version $VERSION"
          # `npm pkg set` writes the field unconditionally, unlike `npm version`
          # (which errors with "Version not changed" if package.json was
          # already bumped to this version in the tagged commit — a valid
          # release flow, not just tag-first-then-let-CI-bump).
          (cd packages/wrap && npm pkg set version="$VERSION")
          (cd packages/create-wrap && npm pkg set version="$VERSION")

      - name: Publish @donilite/wrap
        working-directory: packages/wrap
        run: npm publish

      - name: Publish @donilite/create-wrap
        working-directory: packages/create-wrap
        run: npm publish

      # Only runs once both packages actually published — a GitHub Release
      # should never announce a version that didn't make it to npm. Notes
      # are auto-generated from merged PRs/commits since the previous tag
      # (gh's native --generate-notes); to group them into categories
      # (Features/Fixes/...) instead of one flat list, add a
      # .github/release.yml with a `changelog.categories` config — none
      # exists yet, so this is a flat "What's changed" list for now.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE_FLAG=()
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$VERSION" \
            --generate-notes \
            "${PRERELEASE_FLAG[@]}"
